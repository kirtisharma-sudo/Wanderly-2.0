<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script>
(function(){
    var storedTheme = localStorage.getItem('wanderlyTheme');
    var theme = (storedTheme === 'dark' || storedTheme === 'light')
        ? storedTheme
        : (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
    document.documentElement.setAttribute('data-theme', theme);
})();
</script>

<div class="mobile-backdrop" id="mobileBackdrop"></div>

<div class="Main2">
    <div class="Left">
        <div class="LeftText">
            <h1>Create Account</h1>
            <p>Join Wanderly to start planning your next trip.</p>
        </div>
    </div>

    <div class="Right">
        <div class="RightCard">
            <h1>Sign Up</h1>
            <p>Fill the form to create your account.</p>
            <form onsubmit="return SignupForm()">
                <label for="fullname">Full Name</label>
                <input type="text" id="fullname" placeholder="Enter your full name">
                <span id="alertName"></span>

                <label for="mail">Email Address</label>
                <input type="email" id="mail" placeholder="Enter your email">
                <span id="alertEmail"></span>

                <label for="pass">Password</label>
                <input type="password" id="pass" placeholder="Create a password">
                <span id="alertPass"></span>

                <label for="pass2">Confirm Password</label>
                <input type="password" id="pass2" placeholder="Confirm your password">
                <span id="alertPass2"></span>

                <input type="submit" value="Sign Up" class="LoginButton">

                <div class="socials">
                    <button type="button" class="google">Sign up with Google</button>
                    <button type="button" class="github">Sign up with GitHub</button>
                </div>

                <div class="SignUp">
                    <p>Already have an account? <a href="login.html">Login</a></p>
                </div>
            </form>
        </div>
    </div>

</div>

<script src="js/signup.js"></script>
<button class="ScrollTopBtn" id="scrollTopBtn" aria-label="Scroll to top">
    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="19" x2="12" y2="5"></line><polyline points="5 12 12 5 19 12"></polyline></svg>
</button>

<script src="js/loader.js"></script>
<script src="js/theme.js"></script>
<script src="js/navbar.js"></script>
</body>
</html>
